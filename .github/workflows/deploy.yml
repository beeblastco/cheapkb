name: Deploy Production

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_PROFILE: "954475336309"
  AWS_REGION: us-east-1
  EMBEDDING_PROVIDER_URL: ${{ secrets.EMBEDDING_PROVIDER_URL }}
  EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
  EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
  CHUNK_MAX_TOKENS: "700"
  CHUNK_OVERLAP_TOKENS: "100"
  MAX_UPLOAD_BYTES: "10485760"
  MAX_CHUNKS_PER_DOCUMENT: "200"
  VECTOR_BATCH: "500"
  EMBED_BATCH: "25"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm --prefix web ci --legacy-peer-deps
      - run: npm run format:check
      - run: npm run build
      - run: npm test
      - run: API_URL=https://example.execute-api.us-east-1.amazonaws.com/v1 npm --prefix web run build
      - run: npm audit --audit-level=high
      - run: npm --prefix web audit --audit-level=high

  deploy:
    name: Deploy to Production
    if: github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Configure AWS profile
        run: |
          aws configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}" --profile "$AWS_PROFILE"
          aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}" --profile "$AWS_PROFILE"
          aws configure set region "$AWS_REGION" --profile "$AWS_PROFILE"
      - name: Verify AWS account
        run: test "$(aws sts get-caller-identity --query Account --output text)" = "${{ secrets.AWS_ACCOUNT_ID }}"
      - name: Deploy production
        run: |
          test "$(aws sts get-caller-identity --query Account --output text)" = "954475336309"
          npx sst deploy --stage production
      - name: Verify production pipeline
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: bash .github/scripts/e2e-production.sh
